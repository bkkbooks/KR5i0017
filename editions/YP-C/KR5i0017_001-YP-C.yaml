front:
  text: 重刋道藏輯要高上玉皇心印妙經八祖合註上藥三品神與氣精
  hash: sha256:474391252fe1c0399f0c2c08bdc5991e3fb180bf3937281e1858ffb97bf6ade2
  markers:
  - {type: page-break, offset: 0, content: '', id: YP-C_KR5i0017_07miji-09-0001a}
body:
  text: 秕秕道人曰人身内三寶曰精曰氣曰神神足則明生氣凝則道配精化則體充翕足而循環是爲上藥顧斯藥也不山不水不落不枯本人和順天時因地利不隔畛畦之界無煩灌漑之勤輕賤之則牛溲馬勃之弗如寶貴之則蓍朮參苓之遠遜取擕至便也生息無窮也燥濕不能傷風霜不能蝕金錢不可市貧富不相侵其味長其功巨挺出於温凉補㵼而別具返魂久視之奇視人間之療疾延年而僅乞靈於草木奚翅雲泥之判別而天河海水之懸殊故自雷公岐伯以來不敢登諸本草而心印首標其目者揭薪傳厯效之良方期萬世善爲調劑也恍恍惚惚杳杳冥冥鐵杖老人曰虛實有無之數相倚伏而相與有成無聲無臭之天正以聲其聲臭其臭也是故空皆色色皆空無色之非空則亦無空之非色且春秋冬夏不言而品物亨矣執迹以求之而來往者無形狀然其生長收藏之紛若而鬱然其布濩者無形之形共形矣神與氣精理爲各賦現兩儀之撰呈四象之光而寔基乎太極無極之根源不見端倪之可指虛虛實實無有有無彌綸動靜中各自有其化化生生而逈非誕幻然欲細摹其情態而卓乎曲盡其形容則仍聽之而無聲索之而無臭夫是以謂之爲恍恍爲惚惚是爲杳杳而冥冥雖然旣名之以恍惚杳冥矣則自有其所以爲恍惚爲杳冥而非予人以昏默是故君子卽虛以責實課有於無無存無守有頃刻而成蓬萊道人曰建非常之業而責成於旦夕間則根源未極於堅深一發而旋枯且竭存而守者謂含光内照密於有意無意之天也功無懈於須臾道自豁然於一旦泉之達實之繁知其靈孕於根源時至而幾莫禦矣且所謂道者惟是煉精煉氣煉神復化有爲無而結大丹之體也丹原玄妙其迹似無丹不空虛其形似有無無爲至無可以化而爲有有有爲至有其來實根於無卽有卽無卽無卽有夫是爲恍惚爲杳冥顧見爲無矣而不識無中之有知爲有矣而莫知有生於無任虛浮者罔求實力恃可恃者玄想弗能眞何以存何以守也至如舍近而馳遠厭淡而好奇是又忽其無忽其有忽無中之有有中之無不守不存而藥胥銷爍故當無聲無臭之會不敢蹈空寂然枯滅翻求根蒂一意操存更於有色有相時紛然可據定心固守不致坐荒勿正而勿忘徐以俟其自化眞積力久自相與於有成胎結陽團有不期而自得者故云頃刻而成也頃刻之爲言效甚神而至速也廻風混合百日功靈無上宫主曰余疇曩有言辛苦二三年逍遥千萬刼謂二三年者統養藥結胎之功候彚前後而言之也藥苟養成根深而體固則丹成胎結百日而功自靈矣然結丹之功曰廻風曰混合風也者身内自然之呼吸眞氣之往來無影也而無聲至神也而至速當羣藥萃乎鐺鼎取中宫離火相炙相薰按節鼓風以候自然之火氣火饒一分藥化一分錯落零星有如黍米然後散者收使聚混合而成一粒之珠其色紅黃其形圓固夫乃可謂之丹成乃可謂之胎結迨旣成且結囘思煉度之初相距止需百日始知經不我欺也至功而曰靈示神異也夫以浮埃之面目進而躋眞聖之階慧澈古今光垂天地此實乾坤之至樂而人生不可緩之圖乃萬年不朽之榮華第開基於百日是何如之效而功不謂之靈耶過此關津名標仙籍縱未還虛合道亦尸解羽化作蓬萊之列仙倘面壁深山靜候玉詔大羅座上萬古無疆獨何爲憚百日之修而不奮庸雲路也默朝上帝一紀飛昇醒眼道人曰香縈劔佩瑞拂珠旗入鴛行而覲龍光事屬飛昇以後今也丹還九轉神出三關雖鑿破洪濛別開面目而未得還虛合道安能詣闕趨朝然經曰默朝非卽躬參玉陛也句䝉一紀飛昇之上是默朝而後遲之又久而飛昇也葢嬰兒旣育以來一切塵囂謝絕對空山之風雨惟面壁以跏趺湛寂一心銷融九載消融湛寂九載一心如搢笏升階不違顔於咫尺若垂紳侍立叨醉酒於笙簧默注神凝念念潛通帝謂迨至九年吿竣合體清虛萬化生心乾坤在手自沐彌羅之詔乘鸞跨鶴而飛昇矣一紀云者從養藥三年迄於九年面壁始終一紀而證金剛不壞之身當是時也於斯境也提將日月歸玄象跳出扶輿見太虛陶鑄陰陽而不受陰陽之陶鑄神明變化並自忘變化於神明以十二載之行持成億萬年之德業嗚呼其亦可以奮然興矣知者易悟昧者難行釀花墨客曰葢人心有覺而道體無爲故眞機雖不靳其取擕而要不能强其所不欲知者其天朗其性空或根柢於前因或誠求於篤好當其未與道遇已如秋月氷壺見色生神觸形流影或脉脉於眞師之指授或兢兢於古訓之昭垂徹始徹終一片靈機躍躍而至若天資闇汶嗜慾沉淪茅塞其心而牿亡其性或日迷於霧障或方信而狐疑種種生魔卒昏性海嗚呼人之度量相越豈不遠哉是故道本無私也而亦若有私私也者私於其人之高朗而賦性之虛靈也不昧前因而一心之篤好也彼昧者之冥然罔覺若浮雲之蔽太清日與道違而道亦與之日遠遂若私其所獨眷而他人不得以旁參雖然知者自知也昧者自昧也昧者不自安於昧則旋底於知知而不自保其知則亦流於昧爲知爲昧存乎其人生安困勉之途其亦何常之與有故覔玄子曰大道本來人具足可憐塵世少人知履踐天光呼吸育清三山笛史曰履踐者飛昇之體呼吸者胎息之功當其未至飛昇隨處光明正大如星如日不涉於昏沉而至如胎息之時矢以潔清湛寂不流於穢濁而念與道凝天光澄澈於心清氣滋含於内證仙成道此其大略云雖然履踐非舉足之時實周乎視聽言動之大凡而統該乎内外精粗巨細矣功深於克復而凛若氷淵意極夫精誠而盟諸金石時以五體三花爲念而身心普燭以天光胎息者以神御氣以氣定息胎因息生息因胎住始之以呼吸息息相依内照默存神注氣母如婦人之孕子如小龍之呑珠來往周旋一息不間自得天之氣混之地之氣混之人之氣混之清明呼吸及時而育育旣皆清而渣滓悉去火候力足自聖胎成就而金丹返還矣古云眞人潛深淵浮游守規中權衡開與闔呼吸往來風卽此意也旣踐天光復育清氣自成胎息而飛昇矣然必先之以履踐俾眞固其本根而後施呼吸之宜乃得丹元醖釀不然者行之以凌躐亦未見其有濟云出玄入牝若亡若存盍縷道人曰玄牝者不依形而立惟體道而生似有似無分左分右眞息所由起元氣所由滋察其形圓高中起狀類蓬壺黑白分明象同鷄子其色如錦其運如環中廣一寸二分包一身之精粹按其位在乾之下坤之上震之西兌之東坎離水火交姤之鄕人之關元天地之正中所以爲灝氣之都眞神之地問其名則太極之蒂先天之柄虛無之系造化之源混沌之根太虛之谷歸根竅復命關戊己門庚辛室甲乙戸西南鄉黃中宫眞一處丹元府守一壇偃月爐硃砂鼎龍虎穴黃婆舍丹爐土釜神水華池帝乙神室靈臺絳宫種種異名而實則爲玄牝人之生也精神魂魄交會於斯還丹結胎舍斯奚向故悟眞篇曰要得谷神常不死須憑玄牝立根基眞精若返黃金室一粒明珠永不離修眞者當三年藥足百日功靈眞人浮游於規中陽神飛躍於關際毋蹈於無爲毋形於有作毋落於懸想毋泥於執持或出或入宛轉關生然其出入也不可以有心守不可以無心求以有心守之終莫之有以無心求之終見其無謂之爲亡而躍然有物謂之爲存而杳然無象存亡莫定出入無常若何可也惟凝慮澄心不間不數候氣安和眞陽融化以呼吸爲出入又以出入分左右靜極而噓魚遊春沼動極而反蟲蟄土膏應念而入應念而出氤氲開闔其妙無窮少時便須忘氣合神一歸混沌致虛之極守靜之篤心不妄動無去無來不出不入湛然常住是爲眞人之息以踵踵者其息深深之意也故苟知玄牝之眞知玄牝中之何物與夫出玄而入牝若存若亡之化機守以小心行以大力便可識爐識藥識眞人之浮游以一己之性靈用於眞粹之地誠因明藴明以誠生則采取在此交姤在此烹煉在此沐浴温養結胎脫體罔不在此而證聖飛昇無難馴致矣故曰先後交相接權衡得自如經營養鄞鄂煉神以凝軀毋蹈空毋泥實毋太過不及以彷佛乎至玄至妙之機關則予輩之七返九還用斯道也善學者其詳味而愼思之綿綿不絶固蒂深根無上宫主曰根之深者華自茂蒂之固者實乃堅故究極其終則灼然而眾著屹若崧衡之矗立而介然如金石之貞第原其始而言之惟其息深深乃達之亹亹其從無爲有也祗此空空洞洞之所凝其從有至無也莫非實實枚枚之所化一腔眞意皆生於恍惚而杳冥夫恍惚杳冥猶知其爲恍惚而杳冥是由虛而實也知恍惚杳冥而難定其恍惚而杳冥則是由實而虛也實實虛虛出入於左玄右牝而存亡於若明若昧之餘則規中一竅結就金丹一粒而靈胎乃孕且生矣然時放時收在無差而無間相連如縷相續如泉似有似無乍生乍息極之一時一刻亦必纍纍若貫珠是經之所謂綿綿不絶者少數則炎少踈則冷時小則傷魄時大則傷魂以神馭氣而成胎尤以氣活神而體道也神氣兩相化而大道常釀於中息可住而胎可凝胎可凝而理自具易之所謂黃中通理者此物此志夫故白玉蟾於丹成時恍然而悟曰有無捴向箇中尋非淺非深自産嬰縷縷𢇁連關内氣根基立定守眞神由是言之眞神貴能放尤貴能守放於四海則道充天地守於一穴則道藴中元不密不疎蟬聯而絡繹而後其蒂固其根深華茂而實堅乃以飛昇證聖矣故修丹之要時措有宜以儲藥爲始基以立根爲究竟循途洊至而首尾環生由是而百日靈一紀成踐天光育清氣出玄入牝而至心以默朝是爲修丹之中腹自時厥後功進而有加則了刼超塵永締大羅眞實境儲三品者其由知而悟毋爲昧者之難行也人各有精精合其神神合其氣氣合體眞不得其眞皆是强名邱長春眞人曰僞者不可亂乎眞眞者不可參以僞循名斯核實非以强名名之也且人而名以眞人必成於其體之眞而合眞體中之眞精眞神眞氣也葢人各有體精固之神運之而氣以充之故精神氣與體偕非後起而非强附也然體則惟一而精神氣則爲三三與一俱來而一因三實體之賴有精神與氣也不可離也精者何天之根地之軸山之泰岱水之崑崙父母之樞機而身心之關紐也後天則有象象自心生先天者無形形因心滅有象之精假無形之精眞惟眞乃名精實與有生而俱賦迨至後天之弗保因以戕賊乎先天然而有象與無形缺一而體奚由立顧體之立也立於精也變動而不居神爲之運也故舍精則神無所本無神則精亦凝滯而不能周惟精合其神精斯與神一而至於一身之氣則又體之所待以生者也氣之於神猶精與神之相麗也然氣之爲氣不附於精而附於神神以運爲能而氣以充爲量至剛至大卽至靈至巧之所生不濁不虧亦卽不屈不撓之所養故神與氣合斯精亦相著三品相與以有成夫精合神神合氣三三而化一自一一而根三三無一而弗融自一無時而不足夫是爲眞體眞體卽眞人人而眞則精氣與神合同而化旣不參以僞而名豈强名而不然者雖名之以精氣神游散而不相屬也三者與一不相屬則是爲虛器爲寄生精神與氣且不眞而奚名眞體所有非實有故曰强名抑解是經者謂經所云體本體之體也非身也然精神氣之非眞則三品已皆非本體官骸肺腑廓落而空虛罔之生也卽形體亦非其本體故曰眞者不可參以僞僞者不可亂乎眞神能入石神能飛形入水不溺入火不焚無上宫主曰經言精合神神合氣是氣精二者一神之統貫而始之終之者也以精與氣合於神神之爲用尤大矣葢神雖與氣精合不與氣精同氣精以先天無象者爲眞而無象之中嬰兒姹女鶴息龜胎猶有形而有跡矣神則不凝滯於物物亦不能滯我神而又合精氣以成能非若尋常之恍惚故石者至堅之質飛者致遠之言神經百煉餘而統精氣以合一鋒銛磐郢銳勝水心倐若追風疾如掣電以至堅而入質堅之物斯堅固不摧以致遠而爲凌遠之行斯遠無或禦至若坎離配象而龜蛇日月各有分司則旣濟以來夫豈凡水凡火所能制故三品皆爲上藥而神則統貫乎氣與精合氣精以會於神而神遂爲聖不可知之詣故大易以陰陽不測歸其極於神云神依形生精依氣盈不雕不殘松柏靑靑鐵杖老人曰道以虛而合而虛者亦非懸而無著之名也葢物恒有所憑依而理亦相爲附麗是故神無象也精易虧也易虧而弗虧無象而求象非鏡花水月可擬諸其形容也神之質在形是以無象生有象精之原在氣是以易足化易虧象以形昭亦象以形晦不以至昭昭至晦而昭昭者自生生精固易虧而氣恒至足故氣常周於四體而充滿則自生精精無氣則枯有氣而精斯不涸不枯不涸乃曰眞精且夫耳目官骸形之所具三關六腑形之所函彼修道而養神者將以求夫一粒玄珠永作關元之鎭者也且將以神之所化彰往而察來勁則摧堅飛而致遠水不溺而明珠出海火不焚而紅日經天以之煉虛則虛處非虛以之合道則道中生道此眞神所運非倚著而依於形也然使舍三關離六腑則神亦無舍而出入也於何歸故其依形生猶日月之麗乎天而百穀草木之麗乎土也精依形而藴實依氣而盈氣充則精與俱充氣詘則精因亦詘故欲精華之上達非氣則莫升欲精髓之下垂非氣奚由降譬則枯條槁木無復有發榮滋長之觀者精液之無餘而實則氣機之先盡也以知精之由蓄以氣而盈矣毋勞爾形而凝神以内謐毋暴其氣而養厥眞精形旣完焉神因以固氣之養也精以充周栽者培昌而熾是以如松如柏蔽日而千雲三品一理妙不可聽其聚則有其散則零三山笛史曰天道有陰陽一元之所化人身有三品一理之所涵故精氣與神皆天所付道所包不離人而命名亦不離性而成象也第從其分而論之精有盛衰少壯也氣有長短屈伸也神有清濁昏明也判之則爲三三者之中區以別而以言其合理本一元精生神神生氣氣生精來往循環互爲倚伏有一而無兩安得曰三以一分三以三合一惟淵惟默宛轉關生知其然而莫知其所以然微妙殊堪繹也是故精爲主氣爲輔而聯貫以神無一念之離無一時之間團凝保合斯爲採藥而修丹而如離氣而言精離神而言氣區分三品而無當於合同而化之眞縱欲成丹而丹將於何結矣且旣歧三品而分畔則神未足而精己耗氣末充而神已昏其緒未清而三品之本眞亦失故曰其聚則有其散則零七竅相通竅竅光明聖日聖月照耀金庭醒眼道人曰日月之懸象天之光見聞聲臭之憑依人之竅一塞則皆塞一通則皆通通本性生塞因慾窒去其慾而和其性則塞者漸通塞者而皆通則永通而無復塞然通非直通於外也僅通於外則凡能視能聞能聲能臭何關於性命而何益乎丹元經之所謂通是合精氣與元神凝結而嬰兒以育出入於五官之際而莫窒其靈機以七竅爲門庭以泥丸爲襁褓光瑩晶燦竅竅皆然是誠照耀於金庭而光如日月金庭也者非二十七洞金庭崇妙之天也在内曰靈臺在外曰天壤光華晃朗洞達澄涵暗室舒光虛齋生白故光通於竅莫不光明也而不然者通不終通則通也而究不殊於聾瞶夫聾且瞶矣曾是金庭之照耀聖日聖月云乎哉一得永得自然身輕太和充溢骨散寒瓊來來道人曰求在外者尸其柄於人身具之而身得之天人不能奪是故藥之養丹之修修養失其宜有迨終身而弗得者有所得則廓之愈大而保合太和然必持之於將得未得之先而後効靈於旣得當其三品足而一元固龍虎調而日月昭周習坎於華池照重離於玉鼎黃中通理美在其中涵育薰蒸而操存無間所得爲眞得而積小有高大之觀則所欲者從心應念而皆效一粒易分千處月隻身可作萬方人一息萬年所以爲安貞之吉也且太和之氣其洋溢也無方天地以生成人以之久大渣滓銷盡而脗合清虛清心如氷温其如玉甯有不高飛輕舉而丰骨珊珊者耶原其初則如履如臨旣和倪而繕性洎其後自如圭如璧斯德盛以化神理無待於外求道隨時而具足故君子欲其自得而本立者道自生得丹則靈不得則傾丹在身中非白非靑釀花墨客曰孕育乾坤交融水火彌綸川嶽配合陰陽丹之爲用誠大矣然得不得存乎已而靈與傾不在人得則七竅明三關闢察來彰往飛形入石而上達乎天而不然者漏鼎摇風空鐺煮藥金銷土燥水涸火焦傾者固其所自傾而誰執其咎且丹之得也本無色相之可名非白非靑而靈光湛湛小藏一芥大載地天然上際泥丸下垂湧穴非天所得予非人力之所助而成其得之也自求之其傾之也自失之知其卽身而自具而煉有所歸焉矣是故合知行貞定靜操存體固無間於須臾本憂勤愓厲之深衷而永之爲湛寂眞常之實學求其得而防其失致其靈而戒其傾則丹從此修道從此獲三品從此而渾化而詣極天人有志修玄者其毋自昧於由來之地第反求諸己而心印印於心矣誦持萬遍妙理自明盍縷道人曰凡書必有理理必求明心印一篇無量度人之眞諦也古今信善持誦者紛紛究莫窺其奥妙之所存非誦之不眞乃誦之不得其微耳且誦非口誦在誦以心口誦而心維其微乃得夫微妙之地非淺嘗者之所能窺萬遍云者謂念茲在茲索之旣專而且久也文入妙來無過熟熟則巧生焉萬遍之餘經之義藴從心化篇之外篇之中篇之前篇之後優游而饜飫而理無不明矣倘曰淺嘗將以何物爲三品何象爲杳冥問有無而不知其爲守爲存叩玄牝而不知於何出入厯之百日功何以靈一紀之間飛昇何自視祖氣爲繼起而不知呼吸之非眞錯解精與神而不識先天之別功於何始效於何徵竅求通而反閉其光丹欲靈而轉傾且失經雖誦也直若俗儒之佔畢而無實得於中也
